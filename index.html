<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>技術質問ノート</title>
  <meta name="description" content="疑問をすぐ記事化して蓄積するための静的HTMLノート集">
  <link rel="stylesheet" href="./styles/site.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <p class="site-kicker">Instant Question Notes</p>
      <h1>技術質問ノート</h1>
      <p class="site-lead">思いついた疑問をHTML記事として残し、あとから読み返せる形にするためのノート集です。</p>
    </div>
  </header>

  <main class="site-main">
    <section class="section">
      <div class="section__heading">
        <h2>最近のノート</h2>
        <p>新しい記事を作ったら、この一覧へ日付順に追加します。</p>
      </div>

      <div class="note-list" aria-label="記事一覧">
        <article class="empty-state">
          <h3>まだ記事はありません</h3>
          <p>Codex に「質問: ...」と依頼すると、記事ページを追加してこの一覧を更新します。</p>
        </article>
      </div>
    </section>

    <section class="section section--muted">
      <div class="section__heading">
        <h2>カテゴリ</h2>
        <p>記事が増えたら、テーマごとにカテゴリを増やします。</p>
      </div>

      <ul class="category-list">
        <li>AI / LLM</li>
        <li>Web</li>
        <li>開発環境</li>
        <li>インフラ</li>
      </ul>
    </section>
  </main>
</body>
</html>
